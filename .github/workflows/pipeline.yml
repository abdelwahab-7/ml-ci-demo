name: Model Training and Deployment Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install dvc

      - name: Start MLflow server
        run: |
          # Start MLflow server in background
          python -m mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./artifacts --host 0.0.0.0 --port 5000 > mlflow.log 2>&1 &
          echo "MLFLOW_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "MLflow server started"
              break
            fi
            sleep 1
          done

      - name: Setup DVC remote and pull data
        run: |
          # If data.csv doesn't exist, generate it
          if [ ! -f "data.csv" ]; then
            echo "Generating dataset..."
            python generate_data.py
          fi
          
          # Setup DVC remote
          dvc remote add -d myremote ./dvc_remote || true
          
          # Track data with DVC and push to local remote
          dvc add data.csv
          dvc push
          
          # Remove data to simulate needing to pull from remote storage
          rm data.csv
          
          # Pull data from DVC remote (this is the key demonstration)
          dvc pull

      - name: Train model
        run: |
          MLFLOW_TRACKING_URI=http://localhost:5000 python train.py

      - name: Stop MLflow server
        if: always()
        run: |
          kill ${{ env.MLFLOW_PID }} || true

      - name: Package MLflow database
        run: |
          tar -czf mlflow_db.tar.gz mlflow.db

      - name: Upload MLflow database artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_db
          path: mlflow_db.tar.gz

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Download MLflow database artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow_db
          path: .

      - name: Extract database
        run: |
          tar -xzf mlflow_db.tar.gz

      - name: Start MLflow server
        run: |
          python -m mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./artifacts --host 0.0.0.0 --port 5000 > mlflow.log 2>&1 &
          echo "MLFLOW_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "MLflow server started"
              break
            fi
            sleep 1
          done

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      - name: Check accuracy threshold
        run: |
          MLFLOW_TRACKING_URI=http://localhost:5000 python check_threshold.py

      - name: Stop MLflow server
        if: always()
        run: |
          kill ${{ env.MLFLOW_PID }} || true

      - name: Mock Docker build
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          echo "Docker build simulation complete"
