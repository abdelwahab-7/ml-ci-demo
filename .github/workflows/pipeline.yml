name: Model Training and Deployment Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      model_type:
        description: 'Type of model to train (good or bad)'
        required: true
        default: 'good'
        type: choice
        options:
          - good
          - bad

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install dvc

      - name: Start MLflow server
        run: |
          # Start MLflow server in background
          python -m mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./artifacts --host 0.0.0.0 --port 5000 > mlflow.log 2>&1 &
          echo "MLFLOW_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "MLflow server started"
              break
            fi
            sleep 1
          done

      - name: Pull data with DVC
        run: |
          # This will restore data.csv from the DVC cache (tracked in git)
          dvc pull

      - name: Train model
        run: |
          TRAIN_SCRIPT="train.py"
          if [ "${{ inputs.model_type }}" = "bad" ]; then
            TRAIN_SCRIPT="train_bad.py"
          fi
          echo "Using training script: $TRAIN_SCRIPT"
          MLFLOW_TRACKING_URI=http://localhost:5000 python $TRAIN_SCRIPT

      - name: Stop MLflow server
        if: always()
        run: |
          kill ${{ env.MLFLOW_PID }} || true

      - name: Package MLflow database
        run: |
          tar -czf mlflow_db.tar.gz mlflow.db

      - name: Upload MLflow database artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_db
          path: mlflow_db.tar.gz

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Download MLflow database artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow_db
          path: .

      - name: Extract database
        run: |
          tar -xzf mlflow_db.tar.gz

      - name: Start MLflow server
        run: |
          python -m mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./artifacts --host 0.0.0.0 --port 5000 > mlflow.log 2>&1 &
          echo "MLFLOW_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "MLflow server started"
              break
            fi
            sleep 1
          done

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      - name: Check accuracy threshold
        run: |
          MLFLOW_TRACKING_URI=http://localhost:5000 python check_threshold.py

      - name: Stop MLflow server
        if: always()
        run: |
          kill ${{ env.MLFLOW_PID }} || true

      - name: Mock Docker build
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          echo "Docker build simulation complete"
